<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Pay Tracker</title>

    <link rel="stylesheet" href="styles.css?v=6">
</head>

<body>

    <header class="app-header">
        <div class="brand">
            <h1>Pay Tracker</h1>
            <p>Your work. Your pay. Your time.</p>
        </div>

        <button class="settings-button" type="button">
            Settings
        </button>
    </header>

    <main class="app-content">

        <section class="summary-card">
            <p class="section-label">Current fortnight</p>

            <h2 id="total-pay">$0.00</h2>

            <p class="summary-description">
                Estimated gross pay
            </p>
        </section>

        <section class="employer-section">
            <h2 class="section-title">Employers</h2>

            <article class="employer-card">
                <div class="employer-details">
                    <h3>SeaWorld</h3>

                    <p id="seaworld-summary">
                        No shifts added
                    </p>
                </div>

                <strong id="seaworld-total">
                    $0.00
                </strong>
            </article>

            <article class="employer-card">
                <div class="employer-details">
                    <h3>Queensland Health</h3>

                    <p id="health-summary">
                        No shifts added
                    </p>
                </div>

                <strong id="health-total">
                    $0.00
                </strong>
            </article>
        </section>

        <button
            id="open-shift-form"
            class="add-shift-button"
            type="button"
        >
            + Add Shift
        </button>

        <section
            id="shift-form-section"
            class="shift-form-section hidden"
        >
            <div class="form-card">

                <div class="form-heading">
                    <div>
                        <p class="section-label">New shift</p>
                        <h2>Add Shift</h2>
                    </div>

                    <button
                        id="close-shift-form"
                        class="close-button"
                        type="button"
                        aria-label="Close form"
                    >
                        ×
                    </button>
                </div>

                <form id="shift-form">

                    <div class="form-field">
                        <label for="employer">
                            Employer
                        </label>

                        <select
                            id="employer"
                            name="employer"
                            required
                        >
                            <option value="">
                                Select employer
                            </option>

                            <option value="seaworld">
                                SeaWorld
                            </option>

                            <option value="queensland-health">
                                Queensland Health
                            </option>
                        </select>
                    </div>

                    <div class="form-field">
                        <label for="shift-date">
                            Date
                        </label>

                        <input
                            id="shift-date"
                            name="shiftDate"
                            type="date"
                            required
                        >
                    </div>

                    <div class="time-grid">

                        <div class="form-field">
                            <label for="start-time">
                                Start time
                            </label>

                            <input
                                id="start-time"
                                name="startTime"
                                type="time"
                                required
                            >
                        </div>

                        <div class="form-field">
                            <label for="finish-time">
                                Finish time
                            </label>

                            <input
                                id="finish-time"
                                name="finishTime"
                                type="time"
                                required
                            >
                        </div>

                    </div>

                    <div class="form-field">
                        <label for="break-minutes">
                            Unpaid break
                        </label>

                        <select
                            id="break-minutes"
                            name="breakMinutes"
                            required
                        >
                            <option value="0">
                                No break
                            </option>

                            <option value="15">
                                15 minutes
                            </option>

                            <option value="30">
                                30 minutes
                            </option>

                            <option value="45">
                                45 minutes
                            </option>

                            <option value="60">
                                60 minutes
                            </option>
                        </select>
                    </div>

                    <p
                        id="form-message"
                        class="form-message hidden"
                    ></p>

                    <button
                        class="save-shift-button"
                        type="submit"
                    >
                        Save Shift
                    </button>

                </form>
            </div>
        </section>

        <section class="recent-shifts-section">
            <div class="recent-shifts-heading">
                <h2 class="section-title">
                    Recent Shifts
                </h2>

                <button
                    id="clear-shifts-button"
                    class="clear-button hidden"
                    type="button"
                >
                    Clear all
                </button>
            </div>

            <div id="shift-list">
                <div class="empty-state">
                    <p>No shifts have been saved yet.</p>
                </div>
            </div>
        </section>

    </main>

    <script src="app.js?v=3"></script>

</body>
</html>
